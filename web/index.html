<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cipher</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Background video */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }
    /* Subtle scrim so text stays legible over any frame */
    #scrim {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.15), rgba(0,0,0,.45));
      z-index: -1;
    }

    /* Centered stage */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Naked input */
    #msg {
      width: min(40rem, 90vw);
      background: transparent;
      border: 0;
      outline: 0;
      color: #fff;
      caret-color: #fff;
      text-align: center;
      font: 400 clamp(1.4rem, 4vw, 2.4rem)/1.3 system-ui, sans-serif;
      text-shadow: 0 2px 12px rgba(0,0,0,.6);
    }
    #msg::placeholder { color: rgba(255,255,255,.55); }

    /* Result box */
    #result {
      width: min(44rem, 92vw);
      max-height: 80vh;
      overflow: auto;
      background: rgba(10, 14, 22, .55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 1.5rem 1.6rem;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    #result .label { font-size: .8rem; letter-spacing: .08em; text-transform: uppercase; opacity: .6; }
    #result .text { font-size: clamp(1.3rem, 3vw, 1.9rem); font-weight: 600; word-break: break-word; margin: .25rem 0 .4rem; }
    #result .meta { opacity: .7; font-size: .9rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1.2rem; font-size: .85rem; }
    th, td { text-align: left; padding: .35rem .5rem; border-bottom: 1px solid rgba(255,255,255,.12); }
    td.score { text-align: right; font-variant-numeric: tabular-nums; }
    .err { color: #ff9b9b; }

    /* Back button */
    #back {
      position: fixed;
      top: 1.1rem;
      left: 1.1rem;
      z-index: 2;
      display: none;
      align-items: center;
      gap: .4rem;
      padding: .5rem .9rem;
      font: 500 .95rem system-ui, sans-serif;
      color: #fff;
      background: rgba(10, 14, 22, .45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 999px;
      cursor: pointer;
    }
    #back:hover { background: rgba(10, 14, 22, .7); }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <video id="bg" autoplay muted loop playsinline preload="auto" poster="/poster.jpg">
    <source src="/sky.mp4" type="video/mp4">
  </video>
  <div id="scrim"></div>

  <button id="back" type="button">← back</button>

  <!-- Input view -->
  <div class="stage" id="inputView">
    <input id="msg" type="text" autocomplete="off" autocapitalize="off"
           spellcheck="false" placeholder="enter a message" autofocus>
  </div>

  <!-- Result view -->
  <div class="stage" id="resultView" hidden>
    <div id="result">
      <div class="text" id="bestText"></div>
      <div class="meta" id="bestMeta"></div>
      <table id="ranked" hidden>
        <thead><tr><th>Method</th><th>Decoding</th><th>Key</th><th class="score">Score</th></tr></thead>
        <tbody></tbody>
      </table>
      <div class="err" id="err" hidden></div>
    </div>
  </div>

  <script>
    // --- Background video ---
    // sky.mp4 is baked as a forward+reverse palindrome, so a plain native loop
    // bounces seamlessly. Just nudge play() for browsers that need it.
    document.getElementById("bg").play().catch(() => {});

    // --- Views ---
    const $ = (id) => document.getElementById(id);
    const inputView = $("inputView"), resultView = $("resultView"), back = $("back");
    const input = $("msg"), ranked = $("ranked"), err = $("err");

    function showInput() {
      resultView.hidden = true;
      back.style.display = "none";
      inputView.hidden = false;
      input.focus();
      input.select();
    }
    function showResult() {
      inputView.hidden = true;
      resultView.hidden = false;
      back.style.display = "flex";
    }

    function render(data) {
      err.hidden = true;
      $("bestText").textContent = data.best.text || "(no readable decoding)";
      $("bestMeta").textContent =
        `via ${data.best.method}` +
        (data.best.key ? ` · key "${data.best.key}"` : "") +
        (data.best.score != null ? ` · score ${data.best.score.toFixed(2)}` : "");

      const tbody = ranked.querySelector("tbody");
      tbody.innerHTML = "";
      for (const c of data.ranked) {
        const row = tbody.insertRow();
        row.insertCell().textContent = c.method;
        row.insertCell().textContent = c.text;
        row.insertCell().textContent = c.key || "";
        const s = row.insertCell();
        s.className = "score";
        s.textContent = c.score == null ? "—" : c.score.toFixed(2);
      }
      ranked.hidden = false;
    }

    async function crack() {
      const message = input.value;
      if (!message.trim()) return;
      try {
        const res = await fetch("/api/crack", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        render(await res.json());
      } catch (e) {
        $("bestText").textContent = "";
        $("bestMeta").textContent = "";
        ranked.hidden = true;
        err.hidden = false;
        err.textContent = "Something went wrong: " + e.message;
      }
      showResult();
    }

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); crack(); }
    });
    back.addEventListener("click", showInput);
  </script>
</body>
</html>
