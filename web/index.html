<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cipher cracker</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, sans-serif; max-width: 680px; margin: 6vh auto;
      padding: 0 1rem; line-height: 1.5;
    }
    h1 { margin-bottom: .25rem; }
    p.sub { margin-top: 0; opacity: .7; }
    textarea {
      width: 100%; box-sizing: border-box; min-height: 5rem; font-size: 1rem;
      padding: .6rem; border-radius: 8px; border: 1px solid #8884; font-family: inherit;
    }
    button {
      margin-top: .6rem; padding: .55rem 1.1rem; font-size: 1rem; cursor: pointer;
      border-radius: 8px; border: 0; background: #3b82f6; color: #fff;
    }
    button:disabled { opacity: .5; cursor: default; }
    .best {
      margin-top: 1.4rem; padding: 1rem; border-radius: 8px; background: #3b82f622;
      display: none;
    }
    .best .text { font-size: 1.25rem; font-weight: 600; word-break: break-word; }
    .best .meta { opacity: .7; font-size: .9rem; margin-top: .25rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: .9rem; }
    th, td { text-align: left; padding: .35rem .5rem; border-bottom: 1px solid #8883; }
    td.score { text-align: right; font-variant-numeric: tabular-nums; }
    .err { color: #dc2626; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <h1>Cipher cracker</h1>
  <p class="sub">Paste an encoded message. We try every cipher and return the most English-like decoding.</p>

  <textarea id="msg" placeholder="z cfmv bferkr wifd cltbp jkri" autofocus></textarea>
  <br>
  <button id="go">Crack it</button>

  <div class="best" id="best">
    <div class="text" id="bestText"></div>
    <div class="meta" id="bestMeta"></div>
  </div>
  <div class="err" id="err"></div>

  <table id="ranked" hidden>
    <thead><tr><th>Method</th><th>Decoding</th><th>Key</th><th class="score">Score</th></tr></thead>
    <tbody></tbody>
  </table>

  <script>
    const $ = (id) => document.getElementById(id);
    const go = $("go"), best = $("best"), err = $("err"), ranked = $("ranked");

    async function crack() {
      const message = $("msg").value;
      if (!message.trim()) return;
      go.disabled = true; err.style.display = "none";
      try {
        const res = await fetch("/api/crack", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        $("bestText").textContent = data.best.text || "(no readable decoding)";
        $("bestMeta").textContent =
          `via ${data.best.method}` +
          (data.best.key ? ` · key "${data.best.key}"` : "") +
          (data.best.score != null ? ` · score ${data.best.score.toFixed(2)}` : "");
        best.style.display = "block";

        const tbody = ranked.querySelector("tbody");
        tbody.innerHTML = "";
        for (const c of data.ranked) {
          const row = tbody.insertRow();
          row.insertCell().textContent = c.method;
          row.insertCell().textContent = c.text;
          row.insertCell().textContent = c.key || "";
          const s = row.insertCell();
          s.className = "score";
          s.textContent = c.score == null ? "—" : c.score.toFixed(2);
        }
        ranked.hidden = false;
      } catch (e) {
        err.textContent = "Something went wrong: " + e.message;
        err.style.display = "block";
      } finally {
        go.disabled = false;
      }
    }

    go.addEventListener("click", crack);
    $("msg").addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") crack();
    });
  </script>
</body>
</html>
